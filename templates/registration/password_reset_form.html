{% extends "base.html" %}
{% block title %}Vastanovit Parol{% endblock title %}

{% block content %}

<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm rounded-lg">
                <div class="card-body">
                    <h3 class="text-center text-primary mb-4"><i class="fas fa-lock me-2"></i>Vastanovit Parol</h3>

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            {{ form.as_p }}
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100">Sbrosit Email</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock content %}

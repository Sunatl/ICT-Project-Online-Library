<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MyApp</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #acb6e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }

        .login-card {
            background-color: #fff;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-in-out;
            width: 100%;
            max-width: 400px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h3 {
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-control {
            border-radius: 25px;
            padding: 10px;
            font-size: 16px;
        }

        .btn-primary {
            background-color: #007bff;
            border-radius: 25px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .social-login a {
            font-weight: 500;
            display: inline-block;
            transition: 0.3s;
            font-size: 16px;
        }

        .social-login a:hover {
            color: #0d6efd;
        }

        .icon-input {
            position: relative;
        }

        .icon-input i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #6c757d;
        }

        .icon-input input {
            padding-left: 40px;
        }

        .text-muted, .text-success {
            font-size: 14px;
        }

        /* Mobile Optimization */
        @media (max-width: 576px) {
            .login-card {
                padding: 30px;
            }

            .btn-primary {
                font-size: 14px;
            }

            .login-card h3 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="login-card">
                <h3><i class="fas fa-user-circle me-2"></i>Login to your account</h3>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3 icon-input">
                        <i class="fas fa-envelope"></i>
                        {{ form.username }}
                    </div>

                    <div class="mb-3 icon-input">
                        <i class="fas fa-lock"></i>
                        {{ form.password }}
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i> Login
                        </button>
                    </div>
                </form>

                <div class="text-center social-login my-3">
                    <p class="mb-1">or</p>
                    <a href="https://accounts.google.com/o/oauth2/v2/auth?redirect_uri={{ google_callback_uri }}&prompt=consent&response_type=code&client_id={{ google_client_id }}&scope=openid%20email%20profile&access_type=offline"
                       class="text-decoration-none">
                        <i class="fab fa-google me-2 text-danger"></i> Sign in with Google
                    </a>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{% url 'password_reset' %}" class="text-muted text-decoration-none">Forgot password?</a>
                    <a href="{% url 'home' %}" class="text-success text-decoration-none">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

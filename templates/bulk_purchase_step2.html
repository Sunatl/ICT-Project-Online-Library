{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h4>Қадами 2: Интихоб кунед, ки кадом донишҷӯён китоб мегиранд</h4>
    <form method="post">
        {% csrf_token %}
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Интихоб</th>
                    <th>Ном</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td><input type="checkbox" name="student_{{ student.id }}"></td>
                    <td>{{ student.username }}</td>
                    <td>{{ student.email }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button class="btn btn-success">Сабти китобҳо бо қарз</button>
    </form>
</div>
{% endblock %}

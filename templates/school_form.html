{% extends 'base.html' %}

{% block title %}Create School{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Add / Edit School</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.non_field_errors }}
                
                <div class="mb-3">
                    <label for="id_name" class="form-label">School Name</label>
                    {{ form.name }}
                </div>
                <div class="mb-3">
                    <label for="id_address" class="form-label">Address</label>
                    {{ form.address }}
                </div>
                <div class="mb-3">
                    <label for="id_phone_number" class="form-label">Phone Number</label>
                    {{ form.phone_number }}
                </div>
                <div class="mb-3">
                    <label for="id_date" class="form-label">Date Established</label>
                    {{ form.date }}
                </div>

                <button type="submit" class="btn btn-success">Save</button>
                <a href="{% url 'school-list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

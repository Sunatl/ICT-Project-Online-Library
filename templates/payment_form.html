{% extends 'base.html' %}

{% block title %}Create Payment{% endblock %}

{% block content %}
<section class="payment-form">
    <div class="container">
        <h2 class="form-title">Create Payment</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</section>
{% endblock %}
